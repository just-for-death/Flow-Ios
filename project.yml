name: Flow
options:
  bundleIdPrefix: io.github.aedev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_BITCODE: NO
    PRODUCT_BUNDLE_IDENTIFIER: io.github.aedev.flow.ios
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""   # Set via Codemagic env var $APPLE_TEAM_ID

targets:
  Flow:
    type: application
    platform: iOS
    sources:
      - path: FlowApp
        excludes:
          - "**/*.md"
    info:
      path: FlowApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.aedev.flow.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: FlowApp/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Kingfisher
      - package: GRDB
    scheme:
      testTargets:
        - FlowTests
      gatherCoverageData: true

  FlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FlowTests
    dependencies:
      - target: Flow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.aedev.flow.ios.tests

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "7.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
