name: Flow
options:
  bundleIdPrefix: io.github.aedev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_BITCODE: NO
    PRODUCT_BUNDLE_IDENTIFIER: io.github.aedev.flow.ios
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""   # Set via Codemagic env var $APPLE_TEAM_ID

targets:
  Flow:
    type: application
    platform: iOS
    sources:
      - path: FlowApp
        excludes:
          - "**/*.md"
          - Info.plist
    resources:
      - path: FlowApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.aedev.flow.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        # Merge custom plist with generated keys (icons, DT*). GENERATE=NO was
        # dropping FlowApp/Info.plist entirely on Codemagic unsigned builds.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: FlowApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Flow
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Kingfisher
      - package: GRDB
      - package: ZIPFoundation
    scheme:
      testTargets:
        - FlowTests
      gatherCoverageData: true

  FlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FlowTests
    dependencies:
      - target: Flow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.aedev.flow.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "7.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"
