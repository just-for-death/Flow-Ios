workflows:
  ios-build:
    name: Flow iOS — Debug Build
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "Flow.xcodeproj"
        XCODE_SCHEME: "Flow"
        BUNDLE_ID: "io.github.aedev.flow.ios"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Install dependencies (SPM is resolved automatically by xcodebuild)
        script: |
          xcodebuild -resolvePackageDependencies \
            -project Flow.xcodeproj \
            -scheme "$XCODE_SCHEME"

      - name: Run Linux-parity logic checks (also runnable on Linux)
        script: |
          bash scripts/verify_logic.sh

      - name: Build for simulator (no signing needed)
        script: |
          xcodebuild build \
            -project Flow.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Run unit tests
        script: |
          xcodebuild test \
            -project Flow.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-release:
    name: Flow iOS — Release / IPA
    max_build_duration: 60
    environment:
      vars:
        XCODE_SCHEME: "Flow"
        BUNDLE_ID: "io.github.aedev.flow.ios"
      xcode: latest
      # Set these secrets in Codemagic dashboard:
      #   CERTIFICATE_PRIVATE_KEY   — p8 / p12 private key
      #   CERTIFICATE_PUBLIC_DATA   — DER-encoded cert
      #   PROVISIONING_PROFILE_DATA — base64 mobileprovision
      #   APPLE_TEAM_ID
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Set team ID
        script: |
          sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = \"$APPLE_TEAM_ID\"/g" \
            Flow.xcodeproj/project.pbxproj

      - name: Build & archive
        script: |
          xcodebuild archive \
            -project Flow.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/Flow.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            | xcpretty --color

      - name: Export IPA (ad-hoc for sideloading)
        script: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/Flow.xcarchive \
            -exportPath build/Flow \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            | xcpretty --color

    artifacts:
      - build/Flow/*.ipa
      - build/Flow.xcarchive

  ios-unsigned-ipa:
    name: Flow iOS — Unsigned IPA (TrollStore/AltStore)
    max_build_duration: 60
    environment:
      vars:
        XCODE_SCHEME: "Flow"
        BUNDLE_ID: "io.github.aedev.flow.ios"
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Build Unsigned App
        script: |
          set -eo pipefail
          xcodebuild clean build \
            -project Flow.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            ENTITLEMENTS_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES \
            INFOPLIST_FILE="$PWD/FlowApp/Info.plist" \
            CONFIGURATION_BUILD_DIR="$PWD/build/Release-iphoneos" \
            | xcpretty --color
      - name: Package IPA
        script: |
          set -euo pipefail
          mkdir -p build/Payload
          mv build/Release-iphoneos/Flow.app build/Payload/
          # Codemagic/Xcode unsigned builds often emit a generated-only Info.plist.
          # Merge FlowApp/Info.plist so BG tasks, privacy, and launch keys ship.
          python3 - <<'PY'
          import plistlib, pathlib, sys

          app = next(pathlib.Path("build/Payload").glob("*.app"))
          built_path = app / "Info.plist"
          src_path = pathlib.Path("FlowApp/Info.plist")
          built = plistlib.loads(built_path.read_bytes())
          src = plistlib.loads(src_path.read_bytes())

          replacements = {
              "$(DEVELOPMENT_LANGUAGE)": "en",
              "$(EXECUTABLE_NAME)": "Flow",
              "$(PRODUCT_BUNDLE_IDENTIFIER)": "io.github.aedev.flow.ios",
              "$(PRODUCT_NAME)": "Flow",
              "$(PRODUCT_BUNDLE_PACKAGE_TYPE)": "APPL",
              "$(MARKETING_VERSION)": built.get("CFBundleShortVersionString", "1.0.0"),
              "$(CURRENT_PROJECT_VERSION)": str(built.get("CFBundleVersion", "1")),
          }

          def expand(value):
              if isinstance(value, str):
                  for old, new in replacements.items():
                      value = value.replace(old, new)
                  return value
              if isinstance(value, list):
                  return [expand(v) for v in value]
              if isinstance(value, dict):
                  return {k: expand(v) for k, v in value.items()}
              return value

          src = expand(src)
          for key, value in src.items():
              # Keep asset-catalog icon dictionaries produced by the build.
              if key in ("CFBundleIcons", "CFBundleIcons~ipad") and key in built:
                  continue
              built[key] = value

          built["CFBundleDisplayName"] = "Flow"
          built["CFBundleExecutable"] = "Flow"
          built["CFBundleIdentifier"] = "io.github.aedev.flow.ios"
          built_path.write_bytes(plistlib.dumps(built))

          required = [
              "BGTaskSchedulerPermittedIdentifiers",
              "UIBackgroundModes",
              "NSLocalNetworkUsageDescription",
              "UILaunchScreen",
              "CFBundleDisplayName",
          ]
          missing = [k for k in required if k not in built]
          if missing:
              print("ERROR: Flow.app Info.plist missing keys:", missing, file=sys.stderr)
              print("Present keys:", sorted(built), file=sys.stderr)
              sys.exit(1)
          print("Info.plist merged OK; keys:", len(built))
          PY
          cd build
          zip -qr Flow.ipa Payload
          cd ..
          ls -lh build/Flow.ipa

    artifacts:
      - build/Flow.ipa
