# Flow iOS — XcodeGen app (not SPM). Full feature verification needs the
# iOS Simulator on macOS. Optional local Linux checks: scripts/test_on_linux.sh

name: Flow iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: flow-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-simulator:
    name: Build + unit tests (Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          # Prefer newest installed Xcode on the runner
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Flow.xcodeproj \
            -scheme Flow

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
          # Re-run without xcpretty so failures show full diagnostics
          xcodebuild build \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          set -o pipefail
          # Pick first available iPhone simulator
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c '
import json,sys
d=json.load(sys.stdin)
for runtime, devices in d.get("devices", {}).items():
    if "iOS" not in runtime: continue
    for dev in devices:
        if dev.get("isAvailable") and "iPhone" in dev.get("name",""):
            print(dev["udid"]); raise SystemExit
')
          if [[ -z "$SIM_ID" ]]; then
            echo "No iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Testing on simulator: $SIM_ID"
          xcodebuild test \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
          if-no-files-found: ignore
