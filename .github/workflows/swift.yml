# Flow iOS CI — not a Swift Package Manager project (no Package.swift).
# Linux: pure-logic + feature suite (no Xcode needed).
# macOS: XcodeGen + simulator build + unit tests.

name: Flow iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: flow-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-logic:
    name: Linux logic checks
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v5

      - name: Run Linux feature suite
        run: bash scripts/test_on_linux.sh

  ios-simulator:
    name: iOS Simulator build + test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Flow.xcodeproj \
            -scheme Flow

      - name: Build (Simulator)
        run: |
          set -o pipefail
          DEST=$(xcodebuild -project Flow.xcodeproj -scheme Flow -showdestinations 2>/dev/null \
            | grep -o 'platform:iOS Simulator[^,}]*name:[^,]*' \
            | head -1 \
            | sed 's/platform:\([^,]*\).*name:\([^,]*\)/platform=\1,name=\2/' \
            || true)
          if [[ -z "$DEST" ]]; then
            DEST='generic/platform=iOS Simulator'
          fi
          echo "Using destination: $DEST"
          xcodebuild build \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination "$DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Unit tests
        run: |
          set -o pipefail
          DEST=$(xcodebuild -project Flow.xcodeproj -scheme Flow -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' \
            | grep 'name:iPhone' \
            | head -1 \
            || true)
          # Parse id=... from destination line if present
          SIM_ID=$(echo "$DEST" | grep -o 'id:[A-F0-9-]*' | head -1 | cut -d: -f2 || true)
          if [[ -n "$SIM_ID" ]]; then
            xcodebuild test \
              -project Flow.xcodeproj \
              -scheme Flow \
              -destination "platform=iOS Simulator,id=$SIM_ID" \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO
          else
            xcodebuild test \
              -project Flow.xcodeproj \
              -scheme Flow \
              -destination 'generic/platform=iOS Simulator' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO
          fi
