# Flow iOS — XcodeGen app (not SPM).
# Optional local Linux checks: scripts/test_on_linux.sh

name: Flow iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: flow-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-simulator:
    name: Build + unit tests (Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Flow.xcodeproj \
            -scheme Flow

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Pick iPhone simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available \
            | grep -E "iPhone [0-9]" \
            | grep -v unavailable \
            | head -1 \
            | grep -oE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}" \
            | head -1)
          if [ -z "$SIM_ID" ]; then
            echo "No iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator $SIM_ID"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "id=$SIM_ID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -o pipefail
          # Allow ad-hoc simulator signing — CODE_SIGNING_ALLOWED=NO often SIGTRAPs the test host.
          xcodebuild test \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.id }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: xcresult
          path: TestResults.xcresult
          if-no-files-found: ignore
