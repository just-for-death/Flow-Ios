# Flow iOS — XcodeGen app (not SPM).
# Optional local Linux checks: scripts/test_on_linux.sh
#
# Pin macos-15 + Xcode 16: Xcode 26 / iOS 26 simulators on macos-latest
# frequently SIGTRAP the XCTest host before bootstrap completes.

name: Flow iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: flow-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-simulator:
    name: Build + unit tests (Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 16
        run: |
          set -euo pipefail
          # Prefer Xcode 16.x over 26.x for stable simulator XCTest.
          XCODE=""
          for cand in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_16.app; do
            if [ -d "$cand" ]; then
              XCODE="$cand"
              break
            fi
          done
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          fi
          if [ -z "$XCODE" ]; then
            echo "No Xcode 16 found; available:"
            ls -d /Applications/Xcode*.app 2>/dev/null || true
            exit 1
          fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Flow.xcodeproj \
            -scheme Flow

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Pick iPhone simulator
        id: sim
        run: |
          set -euo pipefail
          SIM_ID=$(python3 - <<'PY'
          import json, subprocess
          raw = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"], text=True)
          data = json.loads(raw)
          devices = data.get("devices", {})
          # Prefer iOS 18.x, then any non-26, then anything.
          def rank(runtime: str) -> tuple:
              r = runtime.lower()
              if "ios-18" in r or "ios 18" in r:
                  return (0, r)
              if "ios-26" in r or "ios 26" in r:
                  return (2, r)
              if "ios-" in r or "ios " in r:
                  return (1, r)
              return (3, r)
          candidates = []
          for runtime, sims in devices.items():
              for sim in sims:
                  name = sim.get("name", "")
                  if "iPhone" not in name:
                      continue
                  if not sim.get("isAvailable", True):
                      continue
                  udid = sim.get("udid")
                  if udid:
                      candidates.append((rank(runtime), name, udid, runtime))
          if not candidates:
              raise SystemExit("No iPhone simulator found")
          candidates.sort()
          _, name, udid, runtime = candidates[0]
          print(f"Picked {name} ({udid}) under {runtime}", flush=True)
          print(udid)
          PY
          )
          # Last line is the UDID
          SIM_ID=$(echo "$SIM_ID" | tail -1)
          echo "Using simulator $SIM_ID"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "id=$SIM_ID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -o pipefail
          # Ad-hoc simulator signing — CODE_SIGNING_ALLOWED=NO often SIGTRAPs the test host.
          xcodebuild test \
            -project Flow.xcodeproj \
            -scheme Flow \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.id }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Dump simulator crash logs
        if: failure()
        run: |
          echo "== Recent DiagnosticReports =="
          ls -lt ~/Library/Logs/DiagnosticReports 2>/dev/null | head -20 || true
          for f in $(ls -t ~/Library/Logs/DiagnosticReports/Flow*.ips 2>/dev/null | head -3); do
            echo "---- $f ----"
            head -c 20000 "$f" || true
          done
          for f in $(ls -t ~/Library/Logs/DiagnosticReports/Flow*.crash 2>/dev/null | head -3); do
            echo "---- $f ----"
            head -c 20000 "$f" || true
          done
          echo "== simctl diagnose (tail) =="
          xcrun simctl spawn "${{ steps.sim.outputs.id }}" log show --last 2m --predicate 'eventMessage CONTAINS "Flow" OR processImagePath CONTAINS "Flow"' 2>/dev/null | tail -80 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xcresult
          path: TestResults.xcresult
          if-no-files-found: ignore
